<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hệ Mặt Trời - Có Mặt Trăng</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      height:100vh;
      background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: #fff;
    }
    .solar-system {
      position: relative;
      width:100%; height:100%;
      transform-style: preserve-3d;
      perspective: 1200px;
    }
    .sun {
      position: absolute;
      top:50%; left:50%;
      width:70px; height:70px;
      background: radial-gradient(circle at 30% 30%, #fff, #ffd000, #ff9900, #ff6600);
      border-radius:50%;
      transform: translate(-50%,-50%);
      box-shadow: 0 0 50px #ffdd00, 0 0 100px #ff9900, 0 0 160px #ff6600;
      z-index:10;
    }
    .orbit {
      position: absolute;
      top:50%; left:50%;
      border:1px solid rgba(255,255,255,0.12);
      border-radius:50%;
      transform: translate(-50%,-50%);
      transform-style: preserve-3d;
    }
    .planet {
      position: absolute;
      top:-10px;
      left:50%;
      width:20px; height:20px;
      border-radius:50%;
      transform: translateX(-50%);
      box-shadow: 0 0 15px rgba(255,255,255,0.7);
      cursor: pointer;
    }
    .moon-orbit {
      position: absolute;
      top:50%; left:50%;
      width: 60px; height: 60px;
      border: 1px dashed rgba(200,220,255,0.3);
      border-radius: 50%;
      transform: translate(-50%,-50%);
      animation: spin-moon 6s linear infinite;
    }
    .moon {
      position: absolute;
      top: -6px; left: 50%;
      width: 8px; height: 8px;
      background: linear-gradient(#e0e0e0, #c0c0c0, #a0a0a0);
      border-radius: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 10px rgba(255,255,255,0.8);
      cursor: pointer;
    }

    /* Quỹ đạo hành tinh */
    #mercury-orbit { width:160px; height:160px; animation: spin 8s linear infinite; }
    #mercury       { width:12px; height:12px; background:#a9a9a9; animation: orbit 8s linear infinite; }

    #venus-orbit   { width:220px; height:220px; animation: spin 12s linear infinite reverse; }
    #venus         { width:18px; height:18px; background:#e8b923; animation: orbit 12s linear infinite; }

    #earth-orbit   { width:300px; height:300px; animation: spin 18s linear infinite; }
    #earth         { width:22px; height:22px; background:#3a82f6; animation: orbit 18s linear infinite; box-shadow:0 0 25px #60a5fa; }

    #mars-orbit    { width:380px; height:380px; animation: spin 25s linear infinite reverse; }
    #mars          { width:16px; height:16px; background:#ef4444; animation: orbit 25s linear infinite; }

    #jupiter-orbit { width:520px; height:520px; animation: spin 40s linear infinite; }
    #jupiter       { width:42px; height:42px; background:linear-gradient(#f59e0b,#d97706); animation: orbit 40s linear infinite; }

    #saturn-orbit  { width:680px; height:680px; animation: spin 60s linear infinite reverse; }
    #saturn        { width:38px; height:38px; background:#fbbf24; animation: orbit 60s linear infinite; }
    #saturn::after {
      content:''; position:absolute; top:50%; left:50%;
      width:90px; height:10px; background:rgba(255,215,0,0.45);
      border-radius:50%; transform:translate(-50%,-50%) rotate(70deg);
      box-shadow:0 0 25px rgba(255,215,0,0.7); z-index:-1;
    }

    #uranus-orbit  { width:860px; height:860px; animation: spin 90s linear infinite; }
    #uranus        { width:30px; height:30px; background:linear-gradient(#7dd3fc,#60a5fa,#3b82f6); animation: orbit 90s linear infinite reverse; box-shadow:0 0 20px #93c5fd; }

    #neptune-orbit { width:1040px; height:1040px; animation: spin 120s linear infinite reverse; }
    #neptune       { width:30px; height:30px; background:linear-gradient(#1e40af,#3b82f6,#60a5fa); animation: orbit 120s linear infinite; box-shadow:0 0 20px #93c5fd; }

    @keyframes spin { from{transform:translate(-50%,-50%) rotate(0deg);} to{transform:translate(-50%,-50%) rotate(360deg);} }
    @keyframes orbit { from{transform:translateX(-50%) rotate(0deg) translateX(50%) rotate(0deg);} to{transform:translateX(-50%) rotate(360deg) translateX(50%) rotate(-360deg);} }
    @keyframes spin-moon { from{transform:translate(-50%,-50%) rotate(0deg);} to{transform:translate(-50%,-50%) rotate(360deg);} }

    /* Responsive */
    @media (max-width:768px) {
      .sun {width:55px;height:55px;}
      #mercury-orbit{width:110px;height:110px;} #venus-orbit{width:160px;height:160px;}
      #earth-orbit{width:210px;height:210px;} #mars-orbit{width:260px;height:260px;}
      #jupiter-orbit{width:360px;height:360px;} #saturn-orbit{width:460px;height:460px;}
      #uranus-orbit{width:580px;height:580px;} #neptune-orbit{width:700px;height:700px;}
      .moon-orbit {width:50px;height:50px;}
    }

    /* Modal */
    .modal {
      display:none;
      position:fixed; top:0; left:0; width:100%; height:100%;
      background:rgba(0,0,0,0.88); z-index:200;
      justify-content:center; align-items:center;
    }
    .modal-content {
      background:rgba(25,35,55,0.97); border:1px solid #60a5fa;
      border-radius:16px; padding:24px; max-width:90%; max-height:88vh;
      overflow-y:auto; text-align:center; box-shadow:0 0 35px #3a82f6;
    }
    .close { float:right; font-size:32px; cursor:pointer; color:#eee; }
    h2 { color:#ffd000; margin-bottom:12px; }
    p { line-height:1.7; font-size:15.5px; margin:12px 0; }

    .controls {
      position:absolute; top:16px; left:50%; transform:translateX(-50%);
      z-index:100;
    }
    button {
      padding:9px 18px; margin:0 6px;
      background:rgba(255,255,255,0.18); border:1px solid #ddd;
      color:white; border-radius:24px; cursor:pointer; font-size:14px;
    }
    button:hover { background:rgba(255,255,255,0.35); }

    .intro {
      position:absolute; bottom:20px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,0.65); padding:16px 20px; border-radius:14px;
      max-width:95%; font-size:14.5px; text-align:center;
    }
  </style>
</head>
<body>
  <div class="solar-system">
    <div class="sun"></div>

    <div class="orbit" id="mercury-orbit"><div class="planet" id="mercury" data-planet="mercury"></div></div>
    <div class="orbit" id="venus-orbit"><div class="planet" id="venus" data-planet="venus"></div></div>
    
    <div class="orbit" id="earth-orbit">
      <div class="planet" id="earth" data-planet="earth"></div>
      <!-- Mặt Trăng -->
      <div class="moon-orbit">
        <div class="moon" data-planet="moon"></div>
      </div>
    </div>

    <div class="orbit" id="mars-orbit"><div class="planet" id="mars" data-planet="mars"></div></div>
    <div class="orbit" id="jupiter-orbit"><div class="planet" id="jupiter" data-planet="jupiter"></div></div>
    <div class="orbit" id="saturn-orbit"><div class="planet" id="saturn" data-planet="saturn"></div></div>
    <div class="orbit" id="uranus-orbit"><div class="planet" id="uranus" data-planet="uranus"></div></div>
    <div class="orbit" id="neptune-orbit"><div class="planet" id="neptune" data-planet="neptune"></div></div>

    <div class="controls">
      <button onclick="speed=0.4; updateSpeed()">Chậm</button>
      <button onclick="speed=1; updateSpeed()">Bình thường</button>
      <button onclick="speed=2.8; updateSpeed()">Nhanh</button>
    </div>

    <div class="intro">
      <strong>Hệ Mặt Trời</strong> – 8 hành tinh + Mặt Trăng quay quanh Trái Đất.  
      Chạm / click vào hành tinh hoặc Mặt Trăng để xem thông tin!
    </div>
  </div>

  <!-- Modal -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">×</span>
      <h2 id="planet-title"></h2>
      <p id="planet-desc"></p>
    </div>
  </div>

  <script>
    let speed = 1;
    const orbits = document.querySelectorAll('.orbit, .moon-orbit');
    
    function updateSpeed() {
      orbits.forEach(el => {
        let dur = parseFloat(getComputedStyle(el).animationDuration) || 10;
        el.style.animationDuration = (dur / speed) + 's';
      });
    }
    updateSpeed();

    const planetInfo = {
      mercury: {
        title: "Sao Thủy (Mercury)",
        desc: "Hành tinh nhỏ nhất và gần Mặt Trời nhất. Nhiệt độ ban ngày ~430°C, ban đêm ~-180°C. Không khí quyển rất mỏng. Một năm = 88 ngày Trái Đất, một ngày = 59 ngày Trái Đất."
      },
      venus: {
        title: "Sao Kim (Venus)",
        desc: "Nóng nhất Hệ Mặt Trời (~465°C) vì hiệu ứng nhà kính cực mạnh. Quay ngược chiều kim đồng hồ. Kích thước gần bằng Trái Đất."
      },
      earth: {
        title: "Trái Đất (Earth)",
        desc: "Hành tinh duy nhất đã biết có sự sống. Có nước lỏng, khí quyển giàu oxy, từ trường bảo vệ. Một năm ≈ 365.25 ngày, một ngày = 24 giờ."
      },
      moon: {
        title: "Mặt Trăng (Moon)",
        desc: "Vệ tinh tự nhiên duy nhất của Trái Đất. Đường kính ~3.474 km (khoảng 1/4 Trái Đất). Khoảng cách trung bình ~384.400 km. Gây ra thủy triều và đã được con người đặt chân (Apollo 11 - 1969)."
      },
      mars: {
        title: "Sao Hỏa (Mars)",
        desc: "Hành tinh Đỏ. Có Olympus Mons – núi lửa cao nhất Hệ Mặt Trời (~22 km). Từng có nước lỏng trong quá khứ. Nhiều sứ mệnh đang tìm kiếm dấu vết vi sinh vật cổ."
      },
      jupiter: {
        title: "Sao Mộc (Jupiter)",
        desc: "Hành tinh lớn nhất, là hành tinh khí khổng lồ. Có Vết Đỏ Lớn – siêu bão tồn tại hàng thế kỷ. Hơn 95 vệ tinh đã biết."
      },
      saturn: {
        title: "Sao Thổ (Saturn)",
        desc: "Nổi tiếng với vành đai băng & đá đẹp nhất. Mật độ rất thấp (nổi được trên nước!). Hơn 145 vệ tinh, nổi bật là Titan."
      },
      uranus: {
        title: "Sao Thiên Vương (Uranus)",
        desc: "Hành tinh băng khổng lồ, quay nằm ngang (trục nghiêng ~98°). Màu xanh nhạt do metan. Rất lạnh (~-224°C)."
      },
      neptune: {
        title: "Sao Hải Vương (Neptune)",
        desc: "Hành tinh xa nhất. Gió mạnh nhất Hệ Mặt Trời (~2100 km/h). Màu xanh đậm do metan. Có Vết Tối Lớn."
      }
    };

    document.querySelectorAll('.planet, .moon').forEach(item => {
      item.addEventListener('click', () => showInfo(item.dataset.planet));
      
      let touchTimer;
      item.addEventListener('touchstart', () => {
        touchTimer = setTimeout(() => showInfo(item.dataset.planet), 280);
      });
      item.addEventListener('touchend', () => clearTimeout(touchTimer));
    });

    function showInfo(key) {
      const info = planetInfo[key];
      if (!info) return;
      document.getElementById('planet-title').textContent = info.title;
      document.getElementById('planet-desc').textContent = info.desc;
      document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }

    window.onclick = function(e) {
      if (e.target === document.getElementById('modal')) closeModal();
    };
  </script>
</body>
</html>
